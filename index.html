<!DOCTYPE html>
<html>
<head>
  <title>Linden's App Launcher</title>
</head>
  <body>
    
    <input id="site" placeholder="Type a site (e.g. google.com)">

    <input id="pages" placeholder="Type a site (e.g. /users/deltarune_lover_tori)">
    

      
      <input id="appInput" placeholder="Type an app (e.g. messages)">
  <button onclick="launch()">Open App</button>
    
        <script> 
        function launch() {
          app = document.getElementById("appInput").value
          site = document.getElementById("site").value
          page = document.getElementById("appInput").value
          if (prompt(` you are going to enter http://${app}.${site}/${page}. enter "continue" to continue`) == "continue") {
          window.open(`http://${app}.${site}/${page}/?source=app%20launcher%20js`, "_blank")
          }
        </script>
  </body>
</html>
